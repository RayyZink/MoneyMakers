services:
  db:
    image: mysql:8.0
    container_name: money_db_container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_ALLOW_EMPTY_PASSWORD: "no"
      MYSQL_DATABASE: MONEY_2026
    ports:
      - "3306:3306"
    volumes:
      - ./docker/db/database.sql:/docker-entrypoint-initdb.d/1-init.sql
      - ./docker/db/seed.sql:/docker-entrypoint-initdb.d/2-seed.sql
      - mysql_money_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-uroot",
          "-proot_password",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    image: node:22-alpine
    container_name: money_api_container
    restart: always
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    command: sh -c "npm install && npm run dev"
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_money_data: